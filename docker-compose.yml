# ───────────────────────────────────────────────
# DesignMirror AI — Docker Compose
# Services: FastAPI, MongoDB, Redis, MinIO
# Usage:  docker-compose up --build
# ───────────────────────────────────────────────

version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: designmirror-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app          # Hot-reload in dev
    restart: unless-stopped

  # ── MongoDB ─────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: designmirror-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: designmirror_user
      MONGO_INITDB_ROOT_PASSWORD: changeme_db_password
      MONGO_INITDB_DATABASE: designmirror
    volumes:
      - mongo_data:/data/db
      - ./database/init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: designmirror-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO (S3-Compatible Object Storage) ────
  minio:
    image: minio/minio:latest
    container_name: designmirror-minio
    ports:
      - "9000:9000"             # API
      - "9001:9001"             # Web Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
  minio_data:

